server:
  port: 9080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: identity-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/identity/**
        - id: tenant-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/tenants/**
        - id: clinic-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/patients/**,/api/v1/doctors/**,/api/v1/appointments/**,/api/v1/tenant-context
        - id: audit-event-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/audit/**
        - id: billing-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/invoices/**,/api/v1/payments/**
        - id: document-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/documents/**
        - id: notification-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/notifications/**
        - id: batch-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/batch/**

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${CARELITE_COGNITO_ISSUER_URI}

management:
  endpoints:
    web:
      exposure:
        include: health,info
